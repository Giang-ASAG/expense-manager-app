name: expense_manager_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.1.0+12

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  flutter_localizations:
    sdk: flutter

  # --- Firebase Ecosystem (Cập nhật theo kết quả pub get của bạn) ---
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  firebase_database: ^12.3.0
  firebase_messaging: ^16.2.0
  google_sign_in: ^7.2.0

  # --- State Management & Logic ---
  flutter_riverpod: ^2.6.1
  get_it: ^9.0.0
  intl: ^0.20.2
  timezone: ^0.10.1

  # --- Storage & Data ---
  shared_preferences: ^2.5.5
  sqflite: ^2.4.2
  path: ^1.9.0

  # --- Utilities & Media ---
  flutter_local_notifications: ^20.1.0
  image_picker: ^1.2.1
  cloudinary_public: ^0.23.1
  device_info_plus: ^11.5.0
  package_info_plus: ^9.0.1
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# Cấu hình Icon ứng dụng
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_app.png"
  min_sdk_android: 21
  # ✅ Android 13+ adaptive icon (khắc phục lỗi không nhận logo)
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo_app.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/logo_app.png
    - assets/db/vikhon_db.db